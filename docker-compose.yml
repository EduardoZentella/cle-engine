services:
  # PostgreSQL database service
  db:
    image: pgvector/pgvector:pg15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cle_engine}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Initialize the database with SQL scripts
      - ./db_init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - cle_network

  # Local Secret Manager service
  vault:
    image: hashicorp/vault:1.21
    container_name: vault
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN_ID:?Set VAULT_DEV_ROOT_TOKEN_ID in .env}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: http://127.0.0.1:8200
    ports:
      - "8200:8200"
    volumes:
      - vault_file:/vault/file
      - vault_logs:/vault/logs
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cle_network

  # Bootstrap Vault data, policies, and AppRole credentials for services
  vault-init:
    image: hashicorp/vault:1.21
    container_name: vault_init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN_ID:?Set VAULT_DEV_ROOT_TOKEN_ID in .env}
      BACKEND_DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-cle_engine}
      BACKEND_EMBEDDING_BACKEND: ${BACKEND_EMBEDDING_BACKEND:-llm_api}
      BACKEND_INTELLIGENCE_BACKEND: ${BACKEND_INTELLIGENCE_BACKEND:-generic_http}
      LLM_API_KEY: ${LLM_API_KEY:?Set LLM_API_KEY in .env}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-text-embedding-3-small}
      LLM_EMBEDDING_URL: ${LLM_EMBEDDING_URL:-https://api.openai.com/v1/embeddings}
      LLM_COMPLETION_MODEL: ${LLM_COMPLETION_MODEL:-gpt-4o-mini}
      LLM_COMPLETION_URL: ${LLM_COMPLETION_URL:-https://api.openai.com/v1/chat/completions}
      FINAL_RERANKER_MODEL_DIR: ${FINAL_RERANKER_MODEL_DIR:-models/final_reranker}
      FINAL_RERANKER_MANIFEST_FILE: ${FINAL_RERANKER_MANIFEST_FILE:-manifest.json}
      BACKEND_PYTHONUNBUFFERED: "1"
      FRONTEND_API_URL: ${FRONTEND_API_URL:?Set FRONTEND_API_URL in .env}
      ADMIN_DATABASE_URL: postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-cle_engine}
      ADMIN_API_URL: ${ADMIN_API_URL:?Set ADMIN_API_URL in .env}
      ADMIN_PYTHONUNBUFFERED: "1"
    volumes:
      - vault_file:/vault/file
      - vault_logs:/vault/logs
      - vault_bootstrap:/vault/bootstrap
      - ./docker/vault:/vault/scripts:ro
    command: sh /vault/scripts/vault-init.sh
    restart: "no"
    networks:
      - cle_network

  # Backend Service (FastAPI)
  backend:
    build: .
    image: cle-engine:backend
    container_name: cle_backend
    ports:
      - "8000:8000"
    environment:
      - VAULT_ADDR=http://vault:8200
    depends_on:
      db:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - app_logs:/var/log/cle-engine
      - vault_bootstrap:/vault/bootstrap:ro
      - ./docker/vault:/vault/scripts:ro
    command: >
      sh -c "sh /vault/scripts/run-with-vault-env.sh backend secret/data/cle-engine/backend --
      sh -c 'uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload 2>&1 | tee -a /var/log/cle-engine/backend.log'"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - cle_network

  # Frontend Service (Vite + React with pnpm)
  frontend:
    image: node:20-alpine
    container_name: cle_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - VAULT_ADDR=http://vault:8200
    depends_on:
      backend:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - app_logs:/var/log/cle-engine
      - vault_bootstrap:/vault/bootstrap:ro
      - ./docker/vault:/vault/scripts:ro
    command: >
      sh -c "apk add --no-cache curl jq > /dev/null &&
      sh /vault/scripts/run-with-vault-env.sh frontend secret/data/cle-engine/frontend --
      sh -c 'corepack enable pnpm && pnpm install && pnpm dev --host 0.0.0.0 --port 5173 2>&1 | tee -a /var/log/cle-engine/frontend.log'"
    networks:
      - cle_network

  # Admin View Service (Streamlit)
  admin:
    build: .
    image: cle-engine:admin
    container_name: cle_admin
    ports:
      - "8501:8501"
    environment:
      - VAULT_ADDR=http://vault:8200
    depends_on:
      backend:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - app_logs:/var/log/cle-engine
      - vault_bootstrap:/vault/bootstrap:ro
      - ./docker/vault:/vault/scripts:ro
    command: >
      sh -c "sh /vault/scripts/run-with-vault-env.sh admin secret/data/cle-engine/admin --
      sh -c 'streamlit run app/admin/dashboard.py --server.port=8501 --server.address=0.0.0.0 2>&1 | tee -a /var/log/cle-engine/admin.log'"
    networks:
      - cle_network

  # Rotates application logs daily and keeps 14 compressed archives
  logrotate:
    image: alpine:3.20
    container_name: cle_logrotate
    depends_on:
      - backend
      - frontend
      - admin
    volumes:
      - app_logs:/var/log/cle-engine
      - ./docker/logrotate/cle-engine:/etc/logrotate.d/cle-engine:ro
    command: sh -c "apk add --no-cache logrotate > /dev/null && while true; do /usr/sbin/logrotate -v /etc/logrotate.conf; sleep 86400; done"
    networks:
      - cle_network

volumes:
  db_data:
    name: cle-engine-db-data
    driver: local
  frontend_node_modules:
    name: cle-engine-frontend-node-modules
    driver: local
  vault_file:
    name: cle-engine-vault-file
    driver: local
  vault_logs:
    name: cle-engine-vault-logs
    driver: local
  vault_bootstrap:
    name: cle-engine-vault-bootstrap
    driver: local
  app_logs:
    name: cle-engine-app-logs
    driver: local

networks:
  cle_network:
    driver: bridge
